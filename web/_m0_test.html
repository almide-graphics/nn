<!DOCTYPE html><html><head><meta charset="utf-8"></head><body><script>
const w = new Worker("./worker.js", { type: "module" });
const lines = [];
w.onmessage = (e) => {
  const m = e.data;
  lines.push(m.type + ":" + (m.text || ""));
  if (m.type === "ready") document.title = "M0_PASS " + m.text;
  if (m.type === "error") document.title = "M0_FAIL " + m.text;
};
setTimeout(() => { if (!document.title) document.title = "M0_TIMEOUT " + lines.join(" | "); }, 12000);
</script></body></html>
