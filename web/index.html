<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nn — Qwen3 chat in the browser, 100% local</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: { extend: { fontFamily: { sans: ['-apple-system', '"Hiragino Sans"', "system-ui", "sans-serif"] } } },
  };
</script>
</head>
<body class="flex h-[100dvh] flex-col bg-gray-950 font-sans text-gray-100 antialiased">

  <header class="border-b border-white/10">
    <div class="mx-auto flex w-full max-w-2xl items-baseline gap-3 px-4 py-3">
      <h1 class="text-sm font-semibold tracking-tight">nn chat</h1>
      <span class="text-xs text-gray-500">Qwen3-0.6B Q8_0 · Almide engine · 100% local</span>
      <span id="status" class="ml-auto truncate text-xs text-gray-500">初期化中…</span>
    </div>
    <div class="h-0.5 w-full bg-transparent">
      <div id="bar" class="h-full w-0 bg-blue-500 transition-[width] duration-200"></div>
    </div>
  </header>

  <main id="log" class="flex-1 overflow-y-auto">
    <div class="mx-auto flex w-full max-w-2xl flex-col gap-3 px-4 py-6"></div>
  </main>

  <form id="f" class="border-t border-white/10">
    <div class="mx-auto flex w-full max-w-2xl items-center gap-2 px-4 py-3">
      <input id="in" autocomplete="off" disabled
        placeholder="メッセージ…（モデル読み込み完了後に送信できます）"
        class="flex-1 rounded-xl border border-white/10 bg-gray-900 px-4 py-2.5 text-sm outline-none placeholder:text-gray-600 focus:border-blue-500 disabled:opacity-50">
      <button id="reset" type="button" disabled title="文脈をクリア"
        class="rounded-xl border border-white/10 px-3 py-2.5 text-sm text-gray-400 hover:bg-white/5 disabled:opacity-40">↺</button>
      <button id="send" type="submit" disabled
        class="rounded-xl bg-blue-600 px-5 py-2.5 text-sm font-medium text-white hover:bg-blue-500 disabled:bg-gray-800 disabled:text-gray-500">送信</button>
    </div>
  </form>

<script type="module">
const logEl = document.querySelector("#log > div");
const scroller = document.getElementById("log");
const input = document.getElementById("in");
const send = document.getElementById("send");
const resetBtn = document.getElementById("reset");
const status = document.getElementById("status");
const bar = document.getElementById("bar");

const BUBBLE = {
  user: "self-end max-w-[85%] whitespace-pre-wrap break-words rounded-2xl bg-blue-600/20 px-4 py-2 text-sm",
  bot:  "self-start max-w-[85%] whitespace-pre-wrap break-words rounded-2xl bg-gray-800/80 px-4 py-2 text-sm",
  sys:  "self-center max-w-[90%] text-center text-xs text-gray-500",
};
function add(kind, text) {
  const d = document.createElement("div");
  d.className = BUBBLE[kind];
  d.textContent = text;
  logEl.appendChild(d);
  scroller.scrollTop = scroller.scrollHeight;
  return d;
}
function setReady(on) {
  input.disabled = !on; send.disabled = !on; resetBtn.disabled = !on;
  if (on) input.focus();
}

const BUILD = "4"; // ?v bump busts the browser's aggressive module cache
const worker = new Worker("./worker.js?v=" + BUILD, { type: "module" });
let current = null;

worker.onmessage = (e) => {
  const m = e.data;
  if (m.type === "status") status.textContent = m.text;
  if (m.type === "progress") bar.style.width = (m.pct | 0) + "%";
  if (m.type === "ready") {
    status.textContent = m.text || "ready";
    bar.style.width = "100%";
    setTimeout(() => { bar.parentElement.classList.add("opacity-0", "transition-opacity"); }, 500);
    setReady(true);
    add("sys", "モデル準備完了 — すべてローカルで動いています");
  }
  if (m.type === "token") {
    if (!current) current = add("bot", "");
    current.textContent += m.text;
    scroller.scrollTop = scroller.scrollHeight;
  }
  if (m.type === "done") { current = null; setReady(true); }
  if (m.type === "error") { status.textContent = "error"; add("sys", "エラー: " + m.text); setReady(false); }
};

const modelUrl = new URLSearchParams(location.search).get("model") || undefined;
worker.postMessage({ type: "config", modelUrl });

document.getElementById("f").addEventListener("submit", (ev) => {
  ev.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  add("user", text);
  input.value = "";
  current = null;
  setReady(false);
  worker.postMessage({ type: "chat", text });
});

resetBtn.addEventListener("click", () => {
  worker.postMessage({ type: "reset" });
  add("sys", "文脈をクリアしました");
});
</script>
</body>
</html>
