<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nn — Qwen3 on Almide, in your browser</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; background: #0d1117; color: #e6edf3;
    font: 15px/1.6 -apple-system, "Hiragino Sans", sans-serif;
    display: flex; flex-direction: column; height: 100dvh;
  }
  header {
    padding: 10px 16px; border-bottom: 1px solid #21262d;
    display: flex; align-items: baseline; gap: 12px;
  }
  header h1 { font-size: 15px; margin: 0; }
  header .sub { color: #7d8590; font-size: 12px; }
  #status { color: #7d8590; font-size: 12px; margin-left: auto; }
  #log {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg { max-width: 72ch; white-space: pre-wrap; word-break: break-word;
         padding: 8px 12px; border-radius: 10px; }
  .user { align-self: flex-end; background: #1f6feb33; }
  .bot  { align-self: flex-start; background: #161b22; }
  .sys  { align-self: center; color: #7d8590; font-size: 12px; }
  form { display: flex; gap: 8px; padding: 12px 16px;
         border-top: 1px solid #21262d; }
  input {
    flex: 1; background: #161b22; color: inherit;
    border: 1px solid #30363d; border-radius: 8px; padding: 10px 12px;
    font: inherit; outline: none;
  }
  input:focus { border-color: #1f6feb; }
  button {
    background: #238636; color: #fff; border: 0; border-radius: 8px;
    padding: 0 18px; font: inherit; cursor: pointer;
  }
  button:disabled { background: #21262d; color: #7d8590; cursor: default; }
  #bar { height: 3px; background: #1f6feb; width: 0%; transition: width .2s; }
</style>
</head>
<body>
<header>
  <h1>nn chat</h1>
  <span class="sub">Qwen3-0.6B Q8_0 — Almide engine, 100% local</span>
  <span id="status">initializing…</span>
</header>
<div id="bar"></div>
<div id="log"></div>
<form id="f">
  <input id="in" placeholder="メッセージ…（モデル読み込み完了後に送信できます）" autocomplete="off" disabled>
  <button id="send" disabled>送信</button>
</form>
<script type="module">
const log = document.getElementById("log");
const input = document.getElementById("in");
const send = document.getElementById("send");
const status = document.getElementById("status");
const bar = document.getElementById("bar");

function add(cls, text) {
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.textContent = text;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
  return d;
}

const worker = new Worker("./worker.js", { type: "module" });
let current = null;

worker.onmessage = (e) => {
  const m = e.data;
  if (m.type === "status") { status.textContent = m.text; }
  if (m.type === "progress") { bar.style.width = (m.pct|0) + "%"; }
  if (m.type === "ready") {
    status.textContent = m.text || "ready";
    bar.style.width = "100%";
    setTimeout(() => bar.style.display = "none", 600);
    input.disabled = false; send.disabled = false; input.focus();
    add("sys", "モデル準備完了 — すべてローカルで動いています");
  }
  if (m.type === "token") {
    if (!current) current = add("bot", "");
    current.textContent += m.text;
    log.scrollTop = log.scrollHeight;
  }
  if (m.type === "done") {
    current = null;
    input.disabled = false; send.disabled = false; input.focus();
  }
  if (m.type === "error") {
    add("sys", "エラー: " + m.text);
    status.textContent = "error";
  }
};

document.getElementById("f").addEventListener("submit", (ev) => {
  ev.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  add("user", text);
  input.value = "";
  input.disabled = true; send.disabled = true;
  worker.postMessage({ type: "chat", text });
});
</script>
</body>
</html>
